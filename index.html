    <style>
        :root { --primary: #ff385c; --host-orange: #ff5a1f; --dark: #0a0a0a; --grey: #f7f7f7; --success: #25D366; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: #1a1a1a; line-height: 1.6; }

        /* NAVIGATION */
        nav { background: white; padding: 15px 5%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 2000; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }
        .nav-links a { text-decoration: none; color: #333; font-weight: 600; margin-left: 25px; font-size: 14px; }

        /* HERO SECTION */
        .hero { 
            height: 85vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 20px;
        }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(32px, 6vw, 65px); margin: 0; }
        .cta-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
        
        /* BUTTONS */
        .btn { padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 13px; transition: 0.3s; cursor: pointer; border: none; }
        .btn-guest { background: var(--primary); color: white; }
        .btn-host { background: var(--host-orange); color: white; }

        /* WHATSAPP FLOAT */
        .whatsapp-float { 
            position: fixed; 
            bottom: 40px; 
            right: 40px; 
            background: var(--success); 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 35px; 
            color: white; 
            z-index: 5000; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-decoration: none;
        }

        footer { background: #000; color: #fff; padding: 60px 5%; text-align: center; margin-top: 50px; }
        .footer-links a { color: #888; text-decoration: none; margin: 0 15px; font-size: 14px; }
    </style>
</head>
