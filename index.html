    <style>
        :root { --primary: #ff385c; --dark: #0f0f0f; --success: #25D366; --bg: #ffffff; }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; color: #222; line-height: 1.6; background: var(--bg); }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* HERO & VIDEO */
        .hero-video-container { position: relative; height: 100vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .bg-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); z-index: -1; }
        .hero-text { text-align: center; color: white; max-width: 900px; padding: 20px; z-index: 1; }
        .hero-text h1 { font-size: clamp(32px, 5vw, 62px); margin: 0; line-height: 1.1; }
        .btn-main { background: var(--primary); color: white; padding: 18px 40px; border-radius: 4px; text-decoration: none; font-weight: 700; display: inline-block; margin-top: 30px; transition: 0.3s; }

        /* MOVING TESTIMONIALS */
        .testimonials-slider { background: #f9f9f9; padding: 80px 0; overflow: hidden; position: relative; }
        .testimonial-track { display: flex; width: calc(300px * 10); animation: scroll 40s linear infinite; }
        .testimonial-card { width: 300px; background: white; margin: 0 20px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-radius: 8px; flex-shrink: 0; }
        .testimonial-card p { font-style: italic; font-size: 14px; }
        .testimonial-card strong { color: var(--primary); display: block; margin-top: 15px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-300px * 5)); } }

        /* CHAT BOT POPUP */
        .chat-widget { position: fixed; bottom: 110px; right: 30px; width: 300px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 9999; flex-direction: column; overflow: hidden; border: 1px solid #eee; }
        .chat-header { background: var(--primary); color: white; padding: 15px; font-weight: 700; display: flex; justify-content: space-between; }
        .chat-body { height: 250px; padding: 15px; font-size: 13px; overflow-y: auto; background: #fcfcfc; }
        .chat-input { display: flex; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; border: none; padding: 10px; outline: none; }
        .chat-input button { background: var(--primary); color: white; border: none; padding: 10px 15px; cursor: pointer; }

        /* NAVIGATION & FOOTER */
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top:0; z-index: 1000; }
        .logo { color: var(--dark); font-size: 24px; font-weight: 800; text-decoration: none; }
        .logo span { color: var(--primary); }
        .stats-bar { background: var(--dark); color: white; padding: 60px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); text-align: center; gap: 30px; }
        .stat-item h2 { color: var(--primary); font-size: 45px; margin: 0; }
        
        .social-links { margin-top: 30px; }
        .social-links a { color: white; font-size: 24px; margin: 0 15px; transition: 0.3s; text-decoration: none; }
        .social-links a:hover { color: var(--primary); }
        
        footer { padding: 80px 5%; background: var(--dark); color: #888; text-align: center; }
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background: #25D366; color: white; border-radius: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 9999; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; }

        @media (max-width: 768px) { .chat-widget { width: 85%; right: 7.5%; } }
    </style>
</head>
