<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Stay | HydAirbnb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 style="color:var(--brand); margin:0;">HydAirbnb</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="properties.html">Properties</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container" style="max-width: 500px; margin-top: 40px;">
        <h2>Booking Request</h2>
        <p style="color: var(--gray);">Fill this in and we will contact you shortly.</p>
        
        <!-- FORMSPREE INTEGRATION START -->
        <form action="https://formspree.io/f/xvzvqeyp" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label>Select Property</label>
                <select name="property">
                    <option value="Hitech City 2BHK">Luxury 2BHK - Hitech City</option>
                    <option value="Gachibowli Studio">Cozy Studio - Gachibowli</option>
                    <option value="Banjara Hills Suite">Executive Suite - Banjara Hills</option>
                </select>
            </div>

            <div class="form-group">
                <label>Planned Check-in Date</label>
                <input type="date" name="checkin_date">
            </div>

            <div class="form-group">
                <label>Additional Notes</label>
                <textarea name="message" rows="4" placeholder="Any special requests?"></textarea>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; padding: 15px;">
                Send Inquiry
            </button>
        </form>
        <!-- FORMSPREE INTEGRATION END -->
    </div>

    <footer class="footer">
        <p>© 2026 HydAirbnb • Hyderabad</p>
    </footer>
</body>
</html>
